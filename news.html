<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Gamaar · Notícies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
:root{
  --gold:#9b7835;
  --gold-2:#6f5424;
  --gold-light:#c7a15a;
  --gold-soft:rgba(155,120,53,.18);
  --bg:#0f1015;
  --surface:rgba(24,25,32,.92);
  --border:rgba(226,191,116,.18);
  --text:#f3ece0;
  --text-muted:#bdb3a4;
}
body{
  margin:0;min-height:100vh;
  background:
    linear-gradient(180deg,rgba(9,10,14,.72),#0f1015 340px),
    radial-gradient(circle at 14% 0%,rgba(137,24,42,.28),transparent 36rem),
    radial-gradient(circle at 86% 8%,rgba(204,159,79,.12),transparent 32rem),
    #0f1015;
  color:var(--text);
  font-family:"Manrope",Arial,sans-serif;
  font-size:14px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:64px 64px;opacity:.25;
  mask-image:linear-gradient(to bottom,#000,transparent 55%);
}

/* ── AUTH OVERLAY ── */
#authOverlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(8,9,13,.88);backdrop-filter:blur(6px);
}
.auth-card{
  width:min(420px,100%);
  background:linear-gradient(160deg,rgba(30,30,38,.98),rgba(18,18,25,.99));
  border:1px solid var(--border);border-radius:14px;
  padding:32px 28px;box-shadow:0 32px 90px rgba(0,0,0,.65);
}
.auth-logo{margin:0 0 6px;color:var(--gold-light);font-family:"Cormorant Garamond",Georgia,serif;font-size:30px;font-weight:700;letter-spacing:.02em}
.auth-logo span{color:#fff2d2}
.auth-logo::after{content:"";display:block;width:36px;height:1px;background:var(--gold);margin-top:4px}
.auth-subtitle{color:var(--text-muted);font-size:12px;margin:0 0 22px}
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tab-btn{
  flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--text-muted);
  font:700 11px/1 "Manrope",Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  transition:all .15s;
}
.tab-btn.active{background:linear-gradient(135deg,var(--gold-light),var(--gold-2));color:#101014;border-color:transparent}
input[type=text],input[type=email],input[type=password]{
  width:100%;margin-bottom:10px;padding:11px 13px;
  background:rgba(7,8,12,.74);color:#fff8ed;
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  outline:none;font:500 13px/1.2 "Manrope",Arial,sans-serif;
}
input::placeholder{color:#897f70}
input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.btn-primary{
  width:100%;padding:11px;border:0;border-radius:8px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-light),var(--gold-2));
  color:#101014;font:800 11px/1 "Manrope",Arial,sans-serif;
  letter-spacing:.09em;text-transform:uppercase;margin-top:2px;
  transition:opacity .15s;
}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-error{color:#ff9a9a;font-size:12px;margin:8px 0 0;min-height:16px}
.auth-switch{text-align:center;margin-top:16px;color:var(--text-muted);font-size:12px}
.auth-switch a{color:var(--gold-light);cursor:pointer;text-decoration:underline}

/* ── HEADER ── */
#app{display:none;min-height:100vh;flex-direction:column}
header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:16px;padding:14px 26px;
  background:rgba(12,13,17,.82);border-bottom:1px solid var(--border);
  backdrop-filter:blur(18px);
}
.logo{margin:0;color:var(--gold-light);font-family:"Cormorant Garamond",Georgia,serif;font-size:28px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.logo span{color:#fff2d2}
.logo::after{content:"";display:block;width:36px;height:1px;background:var(--gold);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 11px;background:rgba(255,255,255,.055);border:1px solid var(--border);border-radius:999px}
.avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold-light),var(--gold-2));color:#101014;font:800 12px/1 "Manrope",Arial,sans-serif}
.btn-sm{padding:7px 12px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.07);color:#e2d7c6;font:700 10px/1 "Manrope",Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.btn-sm:hover{background:rgba(255,255,255,.12)}

/* ── LAYOUT ── */
.container{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:24px;
  max-width:1400px;
  margin:0 auto;
  padding:28px 24px;
  align-items:start;
}

/* ── SEARCH BOX ── */
.search-card{
  background:linear-gradient(180deg,rgba(30,30,37,.86),rgba(18,18,24,.92));
  border:1px solid var(--border);border-radius:12px;padding:22px;
  box-shadow:0 24px 70px rgba(0,0,0,.34);margin-bottom:22px;
}
.search-card h2{margin:0 0 14px;color:var(--gold-light);font-family:"Cormorant Garamond",Georgia,serif;font-size:26px;font-weight:600}
.search-row{display:flex;gap:10px}
.search-row input{flex:1;margin:0}
.search-row button{padding:11px 18px;border:0;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--gold-light),var(--gold-2));color:#101014;font:800 10px/1 "Manrope",Arial,sans-serif;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}
.search-row button:disabled{opacity:.5;cursor:not-allowed}

/* ── SUMMARY ── */
.summary-box{
  background:rgba(155,120,53,.1);border:1px solid rgba(155,120,53,.3);
  border-radius:10px;padding:16px 18px;margin-bottom:18px;display:none;
}
.summary-box h3{margin:0 0 8px;color:var(--gold-light);font-family:"Cormorant Garamond",Georgia,serif;font-size:20px;font-weight:600}
.summary-box p{margin:0;color:var(--text);line-height:1.6;font-size:13px}

/* ── ARTICLES ── */
.article-card{
  background:rgba(20,21,28,.88);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:14px 16px;margin-bottom:12px;
  transition:border-color .15s;
}
.article-card:hover{border-color:rgba(155,120,53,.4)}
.article-source{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.article-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:19px;font-weight:600;color:#fff2d2;line-height:1.25;margin-bottom:6px}
.article-desc{color:var(--text-muted);font-size:12px;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-meta{display:flex;align-items:center;justify-content:space-between;gap:10px}
.article-date{color:#7a7060;font-size:11px}
.article-link{padding:6px 10px;border-radius:6px;background:linear-gradient(135deg,var(--gold-light),var(--gold-2));color:#101014;font:800 9px/1 "Manrope",Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;text-decoration:none}
.article-link:hover{opacity:.85}

/* ── LOADING / EMPTY ── */
.loading{display:none;text-align:center;padding:32px;color:var(--text-muted)}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(199,161,90,.2);border-top-color:var(--gold-light);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-results{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}

/* ── HISTORY SIDEBAR ── */
.history-panel{
  background:linear-gradient(180deg,rgba(30,30,37,.86),rgba(18,18,24,.92));
  border:1px solid var(--border);border-radius:12px;padding:20px;
  box-shadow:0 24px 70px rgba(0,0,0,.34);position:sticky;top:82px;
  max-height:calc(100vh - 100px);overflow-y:auto;
}
.history-panel h2{margin:0 0 14px;color:var(--gold-light);font-family:"Cormorant Garamond",Georgia,serif;font-size:24px;font-weight:600}
.history-item{
  padding:11px 13px;border:1px solid rgba(255,255,255,.07);border-radius:8px;
  margin-bottom:9px;cursor:pointer;transition:border-color .15s,background .15s;
}
.history-item:hover{border-color:rgba(155,120,53,.35);background:rgba(155,120,53,.06)}
.history-item.active{border-color:var(--gold);background:rgba(155,120,53,.1)}
.history-topic{font-weight:700;color:#fff2d2;font-size:13px;margin-bottom:3px}
.history-date{font-size:10px;color:#7a7060}
.history-summary{font-size:11px;color:var(--text-muted);margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.history-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:12px}

/* ── RESPONSIVE ── */
@media(max-width:820px){
  header{flex-wrap:wrap;padding:12px 16px}
  .container{grid-template-columns:1fr;padding:16px}
  .history-panel{position:static;max-height:none}
}
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ── -->
<div id="authOverlay">
  <div class="auth-card">
    <h1 class="auth-logo">Le Gamaar <span>Notícies</span></h1>
    <p class="auth-subtitle">Inicia sessió per accedir al teu historial de notícies</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="showTab('login')">Entrar</button>
      <button class="tab-btn" id="tabSignup" onclick="showTab('signup')">Registrar-se</button>
    </div>

    <!-- Login -->
    <div id="loginTab">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Contrasenya" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
      <p class="auth-error" id="loginError"></p>
    </div>

    <!-- Signup -->
    <div id="signupTab" style="display:none">
      <input type="text" id="signupName" placeholder="Nom">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Contrasenya (mínim 6 caràcters)" onkeydown="if(event.key==='Enter')doSignup()">
      <button class="btn-primary" id="signupBtn" onclick="doSignup()">Crear compte</button>
      <p class="auth-error" id="signupError"></p>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header>
    <h1 class="logo">Le Gamaar <span>Notícies</span></h1>
    <div class="header-right">
      <div class="user-pill">
        <div class="avatar" id="userAvatar">U</div>
        <span id="userName">Usuari</span>
      </div>
      <button class="btn-sm" onclick="doLogout()">Sortir</button>
    </div>
  </header>

  <div class="container">
    <main>
      <!-- Search -->
      <div class="search-card">
        <h2>Cerca notícies</h2>
        <div class="search-row">
          <input type="text" id="topicInput" placeholder="Escriu un tema (ex: intel·ligència artificial, canvi climàtic...)" onkeydown="if(event.key==='Enter')doSearch()">
          <button id="searchBtn" onclick="doSearch()">Cercar</button>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Cercant notícies i generant resum...</div>
      </div>

      <!-- Summary -->
      <div class="summary-box" id="summaryBox">
        <h3 id="summaryTopic">Resum</h3>
        <p id="summaryText"></p>
      </div>

      <!-- Articles -->
      <div id="articlesList"></div>
    </main>

    <!-- History Sidebar -->
    <aside>
      <div class="history-panel">
        <h2>Historial</h2>
        <div id="historyList"><div class="history-empty">Cap cerca encara</div></div>
      </div>
    </aside>
  </div>
</div>

<script>
const TOKEN_KEY = 'lgn_token';
let token = localStorage.getItem(TOKEN_KEY);
let currentHistoryId = null;

// ── TABS ──
function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginTab').style.display = isLogin ? 'block' : 'none';
  document.getElementById('signupTab').style.display = isLogin ? 'none' : 'block';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  document.getElementById('loginError').textContent = '';
  document.getElementById('signupError').textContent = '';
}

// ── AUTH ──
function showAuthOverlay() {
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp(user) {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('userName').textContent = user.name;
  document.getElementById('userAvatar').textContent = (user.name[0] || 'U').toUpperCase();
  loadHistory();
}

async function checkAuth() {
  if (!token) { showAuthOverlay(); return; }
  try {
    const r = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) { token = null; localStorage.removeItem(TOKEN_KEY); showAuthOverlay(); return; }
    const { user } = await r.json();
    showApp(user);
  } catch { showAuthOverlay(); }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errEl.textContent = 'Omple tots els camps'; return; }

  btn.disabled = true; btn.textContent = 'Entrant...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error; return; }
    token = d.token;
    localStorage.setItem(TOKEN_KEY, token);
    showApp(d.user);
  } catch { errEl.textContent = 'Error de connexió'; }
  finally { btn.disabled = false; btn.textContent = 'Entrar'; }
}

async function doSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('signupError');
  const btn = document.getElementById('signupBtn');
  if (!name || !email || !password) { errEl.textContent = 'Omple tots els camps'; return; }

  btn.disabled = true; btn.textContent = 'Creant...';
  try {
    const r = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error; return; }
    token = d.token;
    localStorage.setItem(TOKEN_KEY, token);
    showApp(d.user);
  } catch { errEl.textContent = 'Error de connexió'; }
  finally { btn.disabled = false; btn.textContent = 'Crear compte'; }
}

function doLogout() {
  token = null;
  localStorage.removeItem(TOKEN_KEY);
  showAuthOverlay();
  clearResults();
}

// ── SEARCH ──
async function doSearch() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  clearResults();

  try {
    const r = await fetch('/api/news-search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ topic })
    });
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Error desconegut'); return; }
    renderResults(topic, d.summary, d.articles);
    loadHistory();
  } catch (e) { showError('Error de connexió: ' + e.message); }
  finally { btn.disabled = false; document.getElementById('loading').style.display = 'none'; }
}

function clearResults() {
  document.getElementById('summaryBox').style.display = 'none';
  document.getElementById('articlesList').innerHTML = '';
  currentHistoryId = null;
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
}

function showError(msg) {
  document.getElementById('articlesList').innerHTML = `<div class="empty-results">${escHtml(msg)}</div>`;
}

function renderResults(topic, summary, articles) {
  if (summary) {
    document.getElementById('summaryTopic').textContent = 'Resum: ' + topic;
    document.getElementById('summaryText').textContent = summary;
    document.getElementById('summaryBox').style.display = 'block';
  }

  if (!articles.length) {
    document.getElementById('articlesList').innerHTML = '<div class="empty-results">No s\'han trobat notícies per aquest tema.</div>';
    return;
  }

  document.getElementById('articlesList').innerHTML = articles.map(a => `
    <div class="article-card">
      <div class="article-source">${escHtml(a.source)}</div>
      <div class="article-title">${escHtml(a.title)}</div>
      ${a.description ? `<div class="article-desc">${escHtml(a.description)}</div>` : ''}
      <div class="article-meta">
        <span class="article-date">${formatDate(a.publishedAt)}</span>
        <a class="article-link" href="${escHtml(a.url)}" target="_blank" rel="noopener">Llegir</a>
      </div>
    </div>
  `).join('');
}

// ── HISTORY ──
async function loadHistory() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) return;
    const { history } = await r.json();
    renderHistory(history);
  } catch {}
}

function renderHistory(history) {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = '<div class="history-empty">Cap cerca encara</div>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-item ${h.id === currentHistoryId ? 'active' : ''}" onclick="loadHistoryItem(${h.id}, this)" data-id="${h.id}">
      <div class="history-topic">${escHtml(h.topic)}</div>
      <div class="history-date">${formatDate(h.created_at)}</div>
      ${h.summary ? `<div class="history-summary">${escHtml(h.summary)}</div>` : ''}
    </div>
  `).join('');
}

function loadHistoryItem(id, el) {
  const historyItems = document.querySelectorAll('.history-item');
  historyItems.forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentHistoryId = id;

  // Find the history entry data from the DOM
  const topic = el.querySelector('.history-topic')?.textContent || '';
  const summary = el.querySelector('.history-summary')?.textContent || '';

  // Re-fetch history to get articles for this entry
  fetch('/api/history', { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.json())
    .then(({ history }) => {
      const item = history.find(h => h.id === id);
      if (!item) return;
      document.getElementById('topicInput').value = item.topic;
      renderResults(item.topic, item.summary, item.articles || []);
    });
}

// ── UTILS ──
function escHtml(v) {
  return String(v || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ca-ES', { day:'numeric', month:'short', year:'numeric' });
}

// ── INIT ──
checkAuth();
</script>
</body>
</html>
